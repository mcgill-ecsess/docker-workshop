services:
  frontend:
    # TODO: Build the frontend service
    networks:
      - webapp-network

  backend:
    # TODO: Build the backend service
    networks:
      - webapp-network

  database:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    networks:
      - webapp-network

networks:
  webapp-network:
    driver: bridge

volumes:
  postgres_data: